<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Transfer - DigiVault</title>
    <link rel="stylesheet" href="Customerdashboard.css">
    <style>
        /* Professional Theme Overhaul */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
            --accent-hover: #16a34a;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .transfer-container {
            max-width: 480px;
            width: 90%;
            padding: 40px;
            background: var(--card-bg);
            color: var(--text-primary);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }

        .go-back {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s;
        }

        .go-back:hover {
            color: var(--accent-green);
        }

        .transfer-container h2 {
            text-align: left;
            margin-bottom: 28px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .transfer-container label {
            display: block;
            margin: 15px 0 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .transfer-container input,
        .transfer-container select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--input-bg);
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .transfer-container input:focus,
        .transfer-container select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .transfer-container input[readonly] {
            background: #1e293b;
            color: var(--text-secondary);
            cursor: not-allowed;
            border-style: dashed;
        }

        .transfer-container button[type="submit"] {
            background-color: var(--accent-green);
            color: white;
            cursor: pointer;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            transition: background 0.2s, transform 0.1s;
        }

        .transfer-container button[type="submit"]:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .transfer-container button[type="submit"]:active {
            transform: translateY(0);
        }

        /* Secondary Action Link */
        .add-payee-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .add-payee-link:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-blue);
        }

        /* Success Popup */
        #successPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1e293b;
            color: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            z-index: 9999;
            text-align: center;
            border: 1px solid var(--accent-green);
            width: 320px;
        }

        #successPopup h3 {
            margin-top: 0;
            color: var(--accent-green);
        }

        #successPopup button {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: var(--accent-green);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        /* Overlay for popup */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9998;
        }
    </style>
</head>

<body>
    <div id="overlay"></div>

    <div class="transfer-container">
        <div class="go-back" onclick="goToDashboard()">← Back to Dashboard</div>

        <h2>Money Transfer</h2>
        <form id="transferForm">
            <label for="fromAccount">From Account</label>
            <input type="text" id="fromAccount" name="fromAccount" readonly>

            <label for="toAccount">To Account</label>
            <select id="toAccount" name="toAccount">
                </select>

            <label for="amount">Amount (USD)</label>
            <input type="number" id="amount" name="amount" min="1" placeholder="0.00" required>

            <button type="submit">Transfer Money</button>
        </form>

        <a href="addpayee.html" class="add-payee-link">
            + Add Payee Details
        </a>
    </div>

    <div id="successPopup">
        <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
        <h3>Transfer Successful</h3>
        <p style="color: var(--text-secondary); font-size: 14px;">The funds have been moved successfully.</p>
        <button onclick="redirectToDashboard()">Return to Dashboard</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const apiData = sessionStorage.getItem("apiData");
            const dataFinal = JSON.parse(apiData);

            if (dataFinal && dataFinal.length > 0) {
                document.getElementById("fromAccount").value = dataFinal[0].accountNo;

                fetch("http://127.0.0.1:8080/api/v1/fetchAccounts", {
                    method: "GET",
                    headers: {
                        "Accept": "application/json"
                    }
                })
                    .then(response => response.json())
                    .then(accounts => {
                        const toAccountSelect = document.getElementById("toAccount");
                        accounts.forEach(acc => {
                            if (acc.accountNo !== dataFinal[0].accountNo) {
                                let option = document.createElement("option");
                                option.value = acc.accountNo;
                                option.text = acc.accountNo;
                                toAccountSelect.appendChild(option);
                            }
                        });
                    });
            }

            document.getElementById("transferForm").addEventListener("submit", function (e) {
                e.preventDefault();

                const apiData = sessionStorage.getItem("apiData");
                const dataFinal = JSON.parse(apiData);
                const transferData = {
                    accountNo: document.getElementById("fromAccount").value,
                    toAccount: document.getElementById("toAccount").value,
                    amount: document.getElementById("amount").value,
                    transactionType: "debit"
                };
                let finTxnAmt = dataFinal[0].balance - document.getElementById("amount").value;
                
                if (document.getElementById("amount").value <= parseFloat(dataFinal[0].balance)) {
                    fetch("http://127.0.0.1:8080/api/v1/transfer", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(transferData)
                    })
                        .then(response => {
                            if (response.ok) {
                                const balanceData = {
                                    accountNo: dataFinal[0].accountNo,
                                    balance: finTxnAmt
                                };
                                fetch("http://127.0.0.1:8080/api/v1/updateBalance", {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/json"
                                    },
                                    body: JSON.stringify(balanceData)
                                })
                                    .then(response => {
                                        if (response.ok) {
                                            showSuccessPopup();
                                        } else {
                                            alert("Failed to transfer money.");
                                        }
                                    })
                                    .catch(error => console.error("Error during transfer:", error));
                            } else {
                                alert("Failed to transfer money.");
                            }
                        })
                        .catch(error => console.error("Error during transfer:", error));
                } else {
                    alert("Insufficient Balance");
                }

            });
        });

        function showSuccessPopup() {
            document.getElementById("overlay").style.display = "block";
            document.getElementById("successPopup").style.display = "block";
        }

        function redirectToDashboard() {
            window.location.href = "Customerdashboard.html";
        }

        function goToDashboard() {
            window.location.href = "Customerdashboard.html";
        }
    </script>
</body>

</html>
